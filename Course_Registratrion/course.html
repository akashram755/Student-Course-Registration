<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Course Registration Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#eef2f7;padding:20px}
.container{max-width:1000px;margin:auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
header{border-bottom:3px solid #2c3e50;padding-bottom:15px;margin-bottom:25px;display:flex;justify-content:space-between;flex-wrap:wrap;align-items:center}
header h1{color:#2c3e50;font-size:28px}
nav a{color:#2c3e50;text-decoration:none;margin-left:20px;font-weight:bold;padding:5px 0;border-bottom:2px solid transparent}
nav a:hover{border-bottom-color:#2c3e50}
.card{background:#f8fafc;border-radius:15px;padding:25px;margin-bottom:25px;border:1px solid #e0e7ef}
.card h2{color:#2c3e50;margin-bottom:20px;padding-left:15px;border-left:5px solid #3498db}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px 30px}
.form-group{display:flex;flex-direction:column}
.form-group.full{grid-column:1/-1}
.form-group label{font-weight:600;color:#34495e;margin-bottom:5px;font-size:14px}
.form-group input,.form-group select,.form-group textarea{padding:10px 12px;border:2px solid #dce4ec;border-radius:10px;font-size:14px;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#3498db}
.inline-group{display:flex;flex-wrap:wrap;gap:15px;padding-top:5px}
.inline-group label{font-weight:400;display:flex;align-items:center;gap:5px}
.btn-group{display:flex;gap:15px;margin-top:15px;grid-column:1/-1}
.btn{padding:10px 30px;border:none;border-radius:30px;font-weight:bold;font-size:15px;cursor:pointer}
.btn-primary{background:#2c3e50;color:#fff}
.btn-primary:hover{background:#1a2a3a}
.btn-secondary{background:#dce4ec;color:#2c3e50}
.btn-secondary:hover{background:#c8d2dd}
table{width:100%;border-collapse:collapse}
th{background:#e8edf3;color:#2c3e50;padding:12px;text-align:left}
td{padding:10px;border-top:1px solid #e0e7ef}
tr:hover td{background:#f5f8fc}
.empty{color:#7f8c8d;text-align:center;padding:20px;font-style:italic}
footer{margin-top:30px;padding-top:15px;border-top:2px solid #e0e7ef;text-align:center;color:#5d6d7e}
@media(max-width:700px){.container{padding:15px}.form-row{grid-template-columns:1fr}header{flex-direction:column;align-items:start}nav{margin-top:10px}nav a{margin-left:0;margin-right:20px}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>Evergreen Institute</h1>
<nav>
<a href="#home">Home</a>
<a href="#form">Form</a>
<a href="#registered">Students</a>
</nav>
</header>

<div class="card">
<h2>Student Registration Form</h2>
<form id="regForm">
<div class="form-row">
<div class="form-group">
<label>Full Name *</label>
<input type="text" id="name" placeholder="Enter full name">
</div>
<div class="form-group">
<label>Email *</label>
<input type="text" id="email" placeholder="email@example.com">
</div>
<div class="form-group">
<label>Mobile *</label>
<input type="text" id="mobile" placeholder="10 digits" maxlength="10">
</div>
<div class="form-group">
<label>Gender *</label>
<div class="inline-group">
<label><input type="radio" name="gender" value="Male"> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
</div>
</div>
<div class="form-group">
<label>Department *</label>
<input type="text" id="dept" placeholder="e.g. CSE">
</div>
<div class="form-group">
<label>Course *</label>
<select id="course">
<option value="">Select</option>
<option value="Computer Science">Computer Science</option>
<option value="Cyber Security">Cyber Security</option>
<option value="AI & Data Science">AI & Data Science</option>
</select>
</div>
<div class="form-group full">
<label>Skills</label>
<div class="inline-group">
<label><input type="checkbox" value="Python"> Python</label>
<label><input type="checkbox" value="Java"> Java</label>
<label><input type="checkbox" value="Data Analysis"> Data Analysis</label>
<label><input type="checkbox" value="ML"> ML</label>
</div>
</div>
<div class="form-group">
<label>Date of Birth *</label>
<input type="date" id="dob">
</div>
<div class="form-group full">
<label>Address *</label>
<textarea id="address" rows="2" placeholder="Enter address"></textarea>
</div>
<div class="btn-group">
<button type="submit" class="btn btn-primary">Submit</button>
<button type="reset" class="btn btn-secondary">Reset</button>
</div>
</div>
</form>
</div>

<div class="card">
<h2>Registered Students</h2>
<table>
<thead><tr><th>Name</th><th>Course</th><th>Department</th></tr></thead>
<tbody id="studentList"><tr><td colspan="3" class="empty">No students yet</td></tr></tbody>
</table>
</div>

<footer>&copy; 2026 Evergreen Institute. All rights reserved.</footer>
</div>

<script>
const form=document.getElementById('regForm');
const tbody=document.getElementById('studentList');
const nameInput=document.getElementById('name');
const emailInput=document.getElementById('email');
const mobileInput=document.getElementById('mobile');
const deptInput=document.getElementById('dept');
const courseInput=document.getElementById('course');
const dobInput=document.getElementById('dob');
const addressInput=document.getElementById('address');

function getGender(){
const radios=document.querySelectorAll('input[name="gender"]');
for(let r of radios)if(r.checked)return r.value;
return '';
}

function getSkills(){
const checks=document.querySelectorAll('input[type="checkbox"]');
let s=[];
checks.forEach(c=>{if(c.checked)s.push(c.value);});
return s.join(', ')||'None';
}

function validate(){
if(!nameInput.value.trim()){alert('Name required');nameInput.focus();return false;}
if(!emailInput.value.trim()){alert('Email required');emailInput.focus();return false;}
if(!emailInput.value.includes('@')||!emailInput.value.includes('.')){alert('Invalid email');emailInput.focus();return false;}
if(!mobileInput.value.trim()){alert('Mobile required');mobileInput.focus();return false;}
if(mobileInput.value.length!=10||isNaN(mobileInput.value)){alert('Mobile must be 10 digits');mobileInput.focus();return false;}
if(!getGender()){alert('Select gender');return false;}
if(!deptInput.value.trim()){alert('Department required');deptInput.focus();return false;}
if(!courseInput.value){alert('Select course');courseInput.focus();return false;}
if(!dobInput.value){alert('DOB required');dobInput.focus();return false;}
const birth=new Date(dobInput.value);
const today=new Date();
let age=today.getFullYear()-birth.getFullYear();
if(today.getMonth()<birth.getMonth()||(today.getMonth()===birth.getMonth()&&today.getDate()<birth.getDate()))age--;
if(age<18){alert('Age must be >18');dobInput.focus();return false;}
if(!addressInput.value.trim()){alert('Address required');addressInput.focus();return false;}
return true;
}

form.addEventListener('submit',function(e){
e.preventDefault();
if(!validate())return;
const empty=tbody.querySelector('.empty');
if(empty)tbody.innerHTML='';
const row=document.createElement('tr');
row.innerHTML='<td>'+nameInput.value.trim()+'</td><td>'+courseInput.value+'</td><td>'+deptInput.value.trim()+'</td>';
tbody.appendChild(row);
form.reset();
nameInput.focus();
});
</script>
</body>
</html>
